<div class="grid project-image-card" style="vertical-align: top;">
  <div>
    {{ range . }}
      <div class="align-center">
        <b>{{ .title }}</b>
      </div>
      <article>
        <ul>
          {{ range .links }}
            <li>
              {{ .name }}
              <br/>
              <a href="{{ .link }}">{{ .link }}</a>
            </li>
          {{ end }}
        </ul>
      </article>
    {{ end }}
  </div>
</div>
