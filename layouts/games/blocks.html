{{ define "main" }}
<main class="container">
  <h1>{{ .Title }}</h1>
  <p>{{ .Description }}</p>

  <div>
    <button type="button" id="fullscreenButton" onclick="enterFullscreen()">Enter Fullscreen</button>
  </div>
  <div id="canvasDiv">
  </div>
</main>
{{ end }}

{{ define "footer" }}
  {{ partial "footer.html" . }}
  <script type="module">
    import * as BABYLON from 'https://cdn.jsdelivr.net/npm/@babylonjs/core@9.10.1/+esm';
    import HavokPhysics from 'https://cdn.jsdelivr.net/npm/@babylonjs/havok@1.3.12/+esm';

    async function getInitializedHavok() {
      return await HavokPhysics({
        locateFile: (path) => '/game/' + path
      });
    }

    var canvasDiv = null;
    var globalEngine = null;

    class App {
      make_blocks(scene, shadowGenerator) {
        const woodMaterial = new BABYLON.StandardMaterial("Wood", scene);
        woodMaterial.specularColor = new BABYLON.Color3(0.8, 0.8, 0.8);

        let woodTexture = new BABYLON.Texture('/game/wood.jpg', scene);
        woodMaterial.diffuseTexture = woodTexture;

        var blockLength = 10;
        var blockWidth = blockLength / 3;
        var blockHeight = blockLength / 4;

        const shape = new BABYLON.PhysicsShapeBox(
          new BABYLON.Vector3(0, 0, 0), new BABYLON.Quaternion(0, 0, 0, 1),
          new BABYLON.Vector3(blockWidth, blockHeight, blockLength),
          scene);
        shape.material = { friction: 0.2, restitution: 0.3 };

        var blockSpacing = 0.1;
        var blockName = "block-";

        var towerHeight = 10;

        for (var i = 0; i < towerHeight * 3; i++) {
          var box = BABYLON.MeshBuilder.CreateBox(blockName + i.toString(), { width: blockWidth, height: blockHeight, depth: blockLength }, scene);
          box.position.y += blockHeight / 2 + blockSpacing;
          box.position.y += (blockHeight + blockSpacing) * Math.floor(i / 3);

          if (i % 6 > 2) {
            box.rotate(BABYLON.Vector3.Up(), Math.PI / 2);
            box.position.z += (blockWidth + blockSpacing) * (i % 3) - (blockWidth + blockSpacing);
          } else {
            box.position.x += (blockWidth + blockSpacing) * (i % 3) - (blockWidth + blockSpacing);
          }

          box.material = woodMaterial;
          box.receiveShadows = true;
          shadowGenerator.addShadowCaster(box);

          const boxBody = new BABYLON.PhysicsBody(box, BABYLON.PhysicsMotionType.DYNAMIC, false, scene);
          boxBody.shape = shape;
          boxBody.setMassProperties({ mass: 1 });
        }
      }

      make_ground(scene) {
        var ground_size = 200;
        var ground = BABYLON.MeshBuilder.CreateGround("ground", { width: ground_size, height: ground_size }, scene);
        ground.receiveShadows = true;
        ground.isPickable = false;

        const groundMaterial = new BABYLON.StandardMaterial("Ground Material", scene);
        ground.material = groundMaterial;

        let groundTexture = new BABYLON.Texture('/game/checkerboard_basecolor.png', scene);
        groundMaterial.diffuseColor = new BABYLON.Color3(0.7, 0, 0);
        groundMaterial.diffuseTexture = groundTexture;

        const shape = new BABYLON.PhysicsShapeBox(
          new BABYLON.Vector3(0, 0, 0), new BABYLON.Quaternion(0, 0, 0, 1),
          new BABYLON.Vector3(ground_size, 0.01, ground_size),
          scene);

        const boxBody = new BABYLON.PhysicsBody(ground, BABYLON.PhysicsMotionType.STATIC, false, scene);
        boxBody.shape = shape;
        boxBody.setMassProperties({ mass: 1 });
      }

      async createSceneAsync(engine, canvas) {
        var scene = new BABYLON.Scene(engine);
        scene.autoClear = false;
        scene.autoClearDepthAndStencil = false;

        var gravityVector = new BABYLON.Vector3(0, -9.81, 0);
        var physicsPlugin = new BABYLON.HavokPlugin(true, await getInitializedHavok());
        scene.enablePhysics(gravityVector, physicsPlugin);

        var camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 2.5, Math.PI / 2.5, 30, new BABYLON.Vector3(0, 10, 0), scene);
        camera.upperBetaLimit = Math.PI / 2 - 0.05;
        camera.lowerRadiusLimit = 10;
        camera.upperRadiusLimit = 80;
        camera.attachControl(canvas, true);

        scene.cameraToUseForPointers = camera;

        var sceneLight = new BABYLON.DirectionalLight("dLight", new BABYLON.Vector3(-1, -1, -0.5).normalize(), scene);
        var ambientLight = new BABYLON.HemisphericLight("hLight", new BABYLON.Vector3(0, 1, 1), scene);
        ambientLight.intensity = 0.4;

        var sphere = BABYLON.MeshBuilder.CreateSphere("sphere", { diameter: 1 }, scene);
        sphere.position.y += 0.5;

        sceneLight.autoUpdateExtends = true;
        sceneLight.autoCalcShadowZBounds = true;

        const shadowGenerator = new BABYLON.ShadowGenerator(1024, sceneLight);
        shadowGenerator.usePoissonSampling = true;

        this.make_blocks(scene, shadowGenerator);
        this.make_ground(scene);

        var skyboxTexture = new BABYLON.CubeTexture("/game/skybox/TropicalSunnyDay", scene);
        scene.createDefaultSkybox(skyboxTexture, false, 700);

        return scene;
      }

      constructor() {
        canvasDiv = document.getElementById("canvasDiv");
        var canvas = document.createElement("canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.id = "gameCanvas";
        canvasDiv.appendChild(canvas);

        var engine = new BABYLON.Engine(canvas, true, null, true);
        globalEngine = engine;

        this.createSceneAsync(engine, canvas).then((scene) => {
          window.addEventListener("keydown", (ev) => {
            if (ev.key === 'p') {
              if (scene.debugLayer.isVisible()) {
                scene.debugLayer.hide();
              } else {
                scene.debugLayer.show();
              }
            } else if (ev.key === 'o') {
              if (scene.forceWireframe) {
                scene.forceWireframe = false;
              } else {
                scene.forceWireframe = true;
              }
            }
          });

          var indicatorPoint = BABYLON.MeshBuilder.CreateSphere(
            "indicatorPoint",
            { diameter: 2 },
            scene
          );
          indicatorPoint.isVisible = false;
          var indicatorPointMat = new BABYLON.StandardMaterial(
            "indicatorPointMat",
            scene
          );
          indicatorPointMat.emissiveColor = new BABYLON.Color3(0, 1, 0);
          indicatorPointMat.alpha = 0.7;
          indicatorPoint.material = indicatorPointMat;
          indicatorPoint.isPickable = false;

          scene.onPointerPick = (evt, pickInfo) => {
            pickInfo.pickedMesh.physicsBody.applyImpulse(new BABYLON.Vector3(0, 5, 0), pickInfo.pickedPoint);
          };

          scene.onPointerMove = (evt, pickInfo) => {
            var hit = false;
            var hitPos = null;

            const pickInfoId = scene.pick(scene.pointerX, scene.pointerY);
            hit = pickInfoId.hit;
            hitPos = pickInfoId.pickedPoint;

            if (hit) {
              indicatorPoint.isVisible = true;
              indicatorPoint.position.copyFrom(hitPos);
            }
          };

          engine.runRenderLoop(() => {
            scene.render();
          });
        });
      }
    }

    function enterFullscreen() {
      globalEngine.switchFullscreen(false);
      globalEngine.resize(true);
    }

    window.enterFullscreen = enterFullscreen;

    window.addEventListener('load', () => { new App(); });
    window.addEventListener("resize", () => { globalEngine.resize(true); });
  </script>
{{ end }}
