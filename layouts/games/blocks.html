{{ define "main" }}
<main class="container">
  <h1>{{ .Title }}</h1>
  <p>{{ .Description }}</p>

  <div>
    <button type="button" id="fullscreenButton" onclick="enterFullscreen()">Enter Fullscreen</button>
  </div>
  <div id="canvasDiv">
  </div>
</main>
{{ end }}

{{ define "footer" }}
  {{ partial "footer.html" . }}
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/+esm" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/controls/OrbitControls.js';
    import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm';

    var canvasDiv = null;
    var renderer = null;
    var world = null;

    class App {
      make_blocks(dirLight) {
        const woodTexture = new THREE.TextureLoader().load('/game/wood.jpg');
        this.woodMaterial = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.8 });

        // Configure shadow camera frustum to cover the tower area
        const d = 60;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 200;

        const blockLength = 10;
        const blockWidth = blockLength / 3;
        const blockHeight = blockLength / 4;

        const halfExtents = new CANNON.Vec3(blockWidth / 2, blockHeight / 2, blockLength / 2);
        const shape = new CANNON.Box(halfExtents);
        // friction/restitution set per body below

        const blockSpacing = 0.1;
        const towerHeight = 10;

        for (let i = 0; i < towerHeight * 3; i++) {
          const geometry = new THREE.BoxGeometry(blockWidth, blockHeight, blockLength);
          const box = new THREE.Mesh(geometry, this.woodMaterial);

          let yOff = blockHeight / 2 + blockSpacing;
          yOff += (blockHeight + blockSpacing) * Math.floor(i / 3);
          box.position.y = yOff;

          if (i % 6 > 2) {
            box.rotation.y = Math.PI / 2;
            box.position.z = (blockWidth + blockSpacing) * (i % 3) - (blockWidth + blockSpacing);
          } else {
            box.position.x = (blockWidth + blockSpacing) * (i % 3) - (blockWidth + blockSpacing);
          }

          box.castShadow = true;
          box.receiveShadow = true;
          this.scene.add(box);

          // physics body
          const body = new CANNON.Body({
            mass: 1,
            shape: shape,
            material: new CANNON.Material({ friction: 0.2, restitution: 0.3 })
          });
          body.position.copy(new CANNON.Vec3(box.position.x, box.position.y, box.position.z));

          // Match rotation: if rotated around Y by PI/2
          if (i % 6 > 2) {
            const q = new CANNON.Quaternion();
            q.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), Math.PI / 2);
            body.quaternion.copy(q);
          }

          world.addBody(body);
          this.bodies.push({ mesh: box, body });
        }
      }

      make_ground() {
        const groundSize = 200;
        const geometry = new THREE.PlaneGeometry(groundSize, groundSize);
        geometry.rotateX(-Math.PI / 2); // face up

        const groundTexture = new THREE.TextureLoader().load('/game/checkerboard_basecolor.png');
        const groundMaterial = new THREE.MeshStandardMaterial({ map: groundTexture, color: 0xb30000 });
        const ground = new THREE.Mesh(geometry, groundMaterial);
        ground.receiveShadow = true;
        this.scene.add(ground);

        // physics ground (static box)
        const halfExtents = new CANNON.Vec3(groundSize / 2, 0.01, groundSize / 2);
        const shape = new CANNON.Box(halfExtents);
        const body = new CANNON.Body({ mass: 0 }); // static
        body.addShape(shape);
        body.position.set(0, -0.01, 0);
        world.addBody(body);
      }

      constructor() {
        canvasDiv = document.getElementById("canvasDiv");
        const canvas = document.createElement("canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.id = "gameCanvas";
        canvasDiv.appendChild(canvas);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        this.scene = new THREE.Scene();

        // Physics world
        world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.81, 0) });
        world.broadphase = new CANNON.SAPBroadphase(world);

        this.bodies = [];

        // Camera
        const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 2000);
        camera.position.set(30 * Math.sin(Math.PI / 2.5) * Math.cos(Math.PI / 2.5), 30 * Math.sin(Math.PI / 2.5), 30 * Math.cos(Math.PI / 2.5));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 10, 0);
        controls.maxPolarAngle = Math.PI / 2 - 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 80;
        controls.update();

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(-1, -1, -0.5).normalize().multiplyScalar(50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        this.scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
        this.scene.add(hemiLight);

        // Shadow helper sphere (invisible, for debug)
        const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.y = 0.5;
        this.scene.add(sphere);

        // Skybox
        const loader = new THREE.CubeTextureLoader();
        const skyboxTexture = loader.load([
          '/game/skybox/TropicalSunnyDay_px.jpg',
          '/game/skybox/TropicalSunnyDay_nx.jpg',
          '/game/skybox/TropicalSunnyDay_py.jpg',
          '/game/skybox/TropicalSunnyDay_ny.jpg',
          '/game/skybox/TropicalSunnyDay_pz.jpg',
          '/game/skybox/TropicalSunnyDay_nz.jpg'
        ]);
        this.scene.background = skyboxTexture;

        // Build scene objects
        this.make_blocks(dirLight);
        this.make_ground();

        // Indicator point for hover feedback
        const indicatorGeo = new THREE.SphereGeometry(1, 16, 16);
        const indicatorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.7 });
        const indicatorPoint = new THREE.Mesh(indicatorGeo, indicatorMat);
        indicatorPoint.visible = false;
        this.scene.add(indicatorPoint);

        // Raycaster for pointer interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('click', (evt) => {
          mouse.x = (evt.offsetX / renderer.domElement.clientWidth) * 2 - 1;
          mouse.y = -(evt.offsetY / renderer.domElement.clientHeight) * 2 + 1;
          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObjects(this.scene.children);
          for (const hit of intersects) {
            // Find the physics body corresponding to this mesh
            const pair = this.bodies.find(b => b.mesh === hit.object);
            if (pair) {
              const impulse = new CANNON.Vec3(0, 5, 0);
              const point = new CANNON.Vec3(hit.point.x, hit.point.y, hit.point.z);
              pair.body.applyImpulse(impulse, point);
            }
          }
        });

        renderer.domElement.addEventListener('mousemove', (evt) => {
          mouse.x = (evt.offsetX / renderer.domElement.clientWidth) * 2 - 1;
          mouse.y = -(evt.offsetY / renderer.domElement.clientHeight) * 2 + 1;
          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObjects(this.scene.children);

          if (intersects.length > 0) {
            indicatorPoint.visible = true;
            indicatorPoint.position.copy(intersects[0].point);
          } else {
            indicatorPoint.visible = false;
          }
        });

        // Keyboard shortcuts for wireframe toggle
        window.addEventListener("keydown", (ev) => {
          if (ev.key === 'o') {
            if (this.woodMaterial) {
              this.woodMaterial.wireframe = !this.woodMaterial.wireframe;
            }
          }
        });

        // Animation loop with physics step
        const clock = new THREE.Clock();
        const animate = () => {
          requestAnimationFrame(animate);
          const dt = clock.getDelta();

          world.step(1 / 60, dt, 3);

          for (const pair of this.bodies) {
            pair.mesh.position.copy(pair.body.position);
            pair.mesh.quaternion.copy(pair.body.quaternion);
          }

          controls.update();
          renderer.render(this.scene, camera);
        };
        animate();

        // Handle resize
        window.addEventListener("resize", () => {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        });
      }
    }

    function enterFullscreen() {
      if (renderer && renderer.domElement) {
        renderer.domElement.requestFullscreen().then(() => {
          const canvas = renderer.domElement;
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          renderer.setSize(w, h);
        });
      }
    }

    window.enterFullscreen = enterFullscreen;

    window.addEventListener('load', () => { new App(); });
  </script>
{{ end }}
